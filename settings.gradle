pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

plugins{
	id("dev.kikugie.stonecutter") version "0.9.6"
}


stonecutter{
	create(rootProject){
		versions "1.21.1", "1.21.4", "1.21.6", "1.21.8", "1.21.11"
		vcsVersion = "1.21.11"
	}
}
// Should match your modid
rootProject.name = 'quick-stash'
